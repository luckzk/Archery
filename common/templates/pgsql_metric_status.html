{% extends "base.html" %}

{% block title %}PostgreSQL状态 - Archery{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-12">
        <h3 class="page-header">PostgreSQL状态</h3>
    </div>
</div>

<div class="row">
    <div class="col-lg-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <i class="fa fa-heartbeat fa-fw"></i> 实时指标
            </div>
            <div class="panel-body">
                <div class="form-inline" style="margin-bottom: 15px;">
                    <div class="form-group">
                        <label for="pgsql-instance-select">PostgreSQL实例</label>
                        <select id="pgsql-instance-select" class="form-control" style="min-width: 280px;">
                            <option value="">加载中...</option>
                        </select>
                    </div>
                    <button type="button" id="pgsql-metric-refresh" class="btn btn-primary" disabled>
                        <i class="fa fa-refresh fa-fw"></i> 刷新
                    </button>
                    <span id="pgsql-metric-summary" class="text-muted" style="margin-left: 10px;"></span>
                </div>

                <div id="pgsql-metric-loading" class="text-muted" style="display: none;">正在查询...</div>
                <div id="pgsql-metric-empty" class="text-muted" style="display: none;">暂无可用PostgreSQL指标</div>
                <div id="pgsql-instance-empty" class="text-muted" style="display: none;">暂无可访问的PostgreSQL实例</div>
                <div id="pgsql-metric-error" class="alert alert-danger" style="display: none;"></div>
                <div class="table-responsive" id="pgsql-metric-table-wrapper" style="display: none;">
                    <table class="table table-striped table-bordered table-hover">
                        <thead>
                        <tr>
                            <th>指标</th>
                            <th>状态</th>
                            <th>值</th>
                            <th>行数</th>
                            <th>耗时(ms)</th>
                            <th>错误</th>
                        </tr>
                        </thead>
                        <tbody id="pgsql-metric-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
(function () {
    var instanceSelect = document.getElementById('pgsql-instance-select');
    var refreshButton = document.getElementById('pgsql-metric-refresh');
    var loadingNode = document.getElementById('pgsql-metric-loading');
    var emptyNode = document.getElementById('pgsql-metric-empty');
    var instanceEmptyNode = document.getElementById('pgsql-instance-empty');
    var errorNode = document.getElementById('pgsql-metric-error');
    var tableWrapper = document.getElementById('pgsql-metric-table-wrapper');
    var tableBody = document.getElementById('pgsql-metric-table-body');
    var summaryNode = document.getElementById('pgsql-metric-summary');

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function statusLabel(status) {
        if (status === 'success') {
            return '<span class="label label-success">成功</span>';
        }
        if (status === 'failed') {
            return '<span class="label label-danger">失败</span>';
        }
        return '<span class="label label-default">' + escapeHtml(status) + '</span>';
    }

    function resetState() {
        loadingNode.style.display = 'none';
        emptyNode.style.display = 'none';
        errorNode.style.display = 'none';
        tableWrapper.style.display = 'none';
        tableBody.innerHTML = '';
        summaryNode.innerText = '';
    }

    function renderRows(metrics) {
        return metrics.map(function (metric) {
            return '<tr>' +
                '<td>' + escapeHtml(metric.metric_name) + '<br><small class="text-muted">' + escapeHtml(metric.metric_key) + '</small></td>' +
                '<td>' + statusLabel(metric.status) + '</td>' +
                '<td>' + escapeHtml(metric.value) + '</td>' +
                '<td>' + escapeHtml(metric.row_count) + '</td>' +
                '<td>' + escapeHtml(metric.elapsed_ms) + '</td>' +
                '<td>' + escapeHtml(metric.error) + '</td>' +
                '</tr>';
        }).join('');
    }

    function loadMetrics() {
        var instanceId = instanceSelect.value;
        resetState();
        if (!instanceId) {
            return;
        }
        loadingNode.style.display = 'block';
        refreshButton.disabled = true;
        fetch('/dashboard/pgsql_metrics/api/?instance_id=' + encodeURIComponent(instanceId))
            .then(function (response) {
                return response.json().then(function (payload) {
                    if (!response.ok || payload.status !== 0) {
                        throw new Error(payload.msg || ('加载失败: ' + response.status));
                    }
                    return payload;
                });
            })
            .then(function (payload) {
                var data = payload.data || {};
                var metrics = data.metrics || [];
                loadingNode.style.display = 'none';
                summaryNode.innerText = data.instance_name + '，成功 ' + data.success + '，失败 ' + data.failed;
                if (!metrics.length) {
                    emptyNode.style.display = 'block';
                    return;
                }
                tableBody.innerHTML = renderRows(metrics);
                tableWrapper.style.display = 'block';
            })
            .catch(function (error) {
                loadingNode.style.display = 'none';
                errorNode.innerText = error.message;
                errorNode.style.display = 'block';
            })
            .then(function () {
                refreshButton.disabled = !instanceSelect.value;
            });
    }

    function loadInstances() {
        resetState();
        fetch('/dashboard/pgsql_metrics/instances/')
            .then(function (response) {
                return response.json().then(function (payload) {
                    if (!response.ok || payload.status !== 0) {
                        throw new Error(payload.msg || ('加载失败: ' + response.status));
                    }
                    return payload;
                });
            })
            .then(function (payload) {
                var instances = payload.data || [];
                instanceSelect.innerHTML = '';
                if (!instances.length) {
                    instanceSelect.innerHTML = '<option value="">暂无实例</option>';
                    instanceEmptyNode.style.display = 'block';
                    refreshButton.disabled = true;
                    return;
                }
                instances.forEach(function (instance, index) {
                    var option = document.createElement('option');
                    option.value = instance.id;
                    option.text = instance.instance_name + ' (' + instance.host + ':' + instance.port + ')';
                    instanceSelect.appendChild(option);
                    if (index === 0) {
                        option.selected = true;
                    }
                });
                refreshButton.disabled = false;
                loadMetrics();
            })
            .catch(function (error) {
                instanceSelect.innerHTML = '<option value="">加载失败</option>';
                errorNode.innerText = error.message;
                errorNode.style.display = 'block';
            });
    }

    instanceSelect.addEventListener('change', loadMetrics);
    refreshButton.addEventListener('click', loadMetrics);
    loadInstances();
})();
</script>
{% endblock %}

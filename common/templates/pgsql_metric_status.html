{% extends "base.html" %}

{% block title %}PostgreSQL状态 - Archery{% endblock %}

{% block content %}
<style>
.pgsql-metrics-page {
    color: #263238;
}
.pgsql-metrics-page .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 16px;
    padding: 0 0 12px;
    border-bottom: 1px solid #e5e9ef;
}
.pgsql-metrics-page .page-head h3 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.35;
}
.pgsql-metrics-page .page-head small {
    display: block;
    margin-top: 4px;
    color: #6b7785;
    font-size: 12px;
    font-weight: 400;
}
.pgsql-metrics-page .runtime-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    padding: 5px 10px;
    border: 1px solid #d8e0e8;
    border-radius: 14px;
    background: #fff;
    color: #52606d;
    font-size: 12px;
    white-space: nowrap;
}
.pgsql-metrics-page .runtime-chip .fa-circle {
    color: #8aa1b4;
    font-size: 8px;
}
.pgsql-metrics-page .runtime-chip.is-ready .fa-circle {
    color: #1f9d74;
}
.pgsql-metrics-page .runtime-chip.is-error .fa-circle {
    color: #d9534f;
}
.pgsql-metrics-page .runtime-chip.is-loading .fa-circle {
    color: #4f8fcf;
}
.pgsql-metrics-page .metrics-toolbar {
    margin-bottom: 14px;
    padding: 14px 16px;
    border: 1px solid #dfe5ec;
    border-radius: 6px;
    background: #fbfcfd;
}
.pgsql-metrics-page .toolbar-grid {
    display: grid;
    grid-template-columns: minmax(260px, 1.2fr) minmax(260px, 1.4fr) auto;
    gap: 12px;
    align-items: end;
}
.pgsql-metrics-page .field-label {
    display: block;
    margin-bottom: 5px;
    color: #52606d;
    font-size: 12px;
    font-weight: 600;
}
.pgsql-metrics-page .form-control {
    height: 36px;
    border-color: #cfd7df;
    border-radius: 4px;
    box-shadow: none;
}
.pgsql-metrics-page .form-control:focus {
    border-color: #4f8fcf;
    box-shadow: 0 0 0 2px rgba(79, 143, 207, 0.12);
}
.pgsql-metrics-page .toolbar-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
    align-items: center;
    color: #5f6f7d;
    font-size: 12px;
}
.pgsql-metrics-page .toolbar-meta .meta-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    max-width: 100%;
    padding: 5px 8px;
    border: 1px solid #e2e8ef;
    border-radius: 4px;
    background: #fff;
}
.pgsql-metrics-page .toolbar-meta .meta-value {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.pgsql-metrics-page .toolbar-actions {
    display: flex;
    justify-content: flex-end;
}
.pgsql-metrics-page .metrics-refresh-btn {
    min-width: 92px;
    height: 36px;
    border-radius: 4px;
}
.pgsql-metrics-page .metric-summary-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
}
.pgsql-metrics-page .summary-card {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 78px;
    padding: 14px;
    border: 1px solid #dfe5ec;
    border-radius: 6px;
    background: #fff;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
}
.pgsql-metrics-page .summary-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 38px;
    width: 38px;
    height: 38px;
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
}
.pgsql-metrics-page .summary-card-instance .summary-icon {
    background: #4f8fcf;
}
.pgsql-metrics-page .summary-card-success .summary-icon {
    background: #1f9d74;
}
.pgsql-metrics-page .summary-card-failed .summary-icon {
    background: #d9534f;
}
.pgsql-metrics-page .summary-card-latency .summary-icon {
    background: #b7791f;
}
.pgsql-metrics-page .summary-label {
    color: #6b7785;
    font-size: 12px;
    line-height: 1.4;
}
.pgsql-metrics-page .summary-value {
    margin-top: 2px;
    color: #263238;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.2;
}
.pgsql-metrics-page .summary-subtitle {
    margin-top: 3px;
    color: #8a97a6;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.pgsql-metrics-page .state-area {
    margin-bottom: 14px;
}
.pgsql-metrics-page .metric-state {
    padding: 18px;
    border: 1px solid #dfe5ec;
    border-radius: 6px;
    background: #fff;
    color: #5f6f7d;
    text-align: center;
}
.pgsql-metrics-page .metric-state .fa {
    margin-right: 6px;
}
.pgsql-metrics-page .metrics-table-surface {
    border: 1px solid #dfe5ec;
    border-radius: 6px;
    background: #fff;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
}
.pgsql-metrics-page .table-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #edf0f4;
    background: #fbfcfd;
    border-radius: 6px 6px 0 0;
}
.pgsql-metrics-page .table-heading h4 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
}
.pgsql-metrics-page .table-heading .table-summary {
    color: #6b7785;
    font-size: 12px;
    text-align: right;
}
.pgsql-metrics-page .metrics-table {
    margin-bottom: 0;
}
.pgsql-metrics-page .metrics-table > thead > tr > th {
    border-bottom: 1px solid #dfe5ec;
    color: #52606d;
    font-size: 12px;
    font-weight: 600;
    background: #fbfcfd;
    white-space: nowrap;
}
.pgsql-metrics-page .metrics-table > tbody > tr > td {
    vertical-align: middle;
    border-top-color: #edf0f4;
}
.pgsql-metrics-page .metrics-table > tbody > tr.metric-row-success > td:first-child {
    border-left: 3px solid #1f9d74;
}
.pgsql-metrics-page .metrics-table > tbody > tr.metric-row-failed > td:first-child {
    border-left: 3px solid #d9534f;
}
.pgsql-metrics-page .metric-name {
    font-weight: 600;
    color: #263238;
}
.pgsql-metrics-page .metric-key {
    display: block;
    margin-top: 3px;
    color: #8a97a6;
    font-size: 12px;
    word-break: break-all;
}
.pgsql-metrics-page .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    min-width: 58px;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
}
.pgsql-metrics-page .status-pill-success {
    background: #e8f6f1;
    color: #147a5b;
}
.pgsql-metrics-page .status-pill-failed {
    background: #fbe9e8;
    color: #b23b35;
}
.pgsql-metrics-page .status-pill-default {
    background: #eef2f6;
    color: #52606d;
}
.pgsql-metrics-page .metric-value {
    display: inline-block;
    max-width: 260px;
    padding: 4px 8px;
    border: 1px solid #dfe5ec;
    border-radius: 4px;
    background: #f8fafc;
    color: #263238;
    font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
    font-size: 12px;
    line-height: 1.5;
    word-break: break-all;
}
.pgsql-metrics-page .metric-description {
    max-width: 360px;
    color: #5f6f7d;
    font-size: 12px;
    line-height: 1.5;
}
.pgsql-metrics-page .metric-error {
    max-width: 420px;
    color: #b23b35;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
}
.pgsql-metrics-page .number-cell {
    color: #36454f;
    font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
    font-size: 12px;
    white-space: nowrap;
}
.pgsql-metrics-page .alert {
    border-radius: 6px;
}
@media (max-width: 1199px) {
    .pgsql-metrics-page .toolbar-grid {
        grid-template-columns: minmax(240px, 1fr) minmax(240px, 1fr);
    }
    .pgsql-metrics-page .toolbar-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
    }
    .pgsql-metrics-page .metric-summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}
@media (max-width: 767px) {
    .pgsql-metrics-page .page-head,
    .pgsql-metrics-page .table-heading {
        align-items: flex-start;
        flex-direction: column;
    }
    .pgsql-metrics-page .toolbar-grid,
    .pgsql-metrics-page .metric-summary-grid {
        grid-template-columns: 1fr;
    }
    .pgsql-metrics-page .toolbar-meta {
        align-items: stretch;
        flex-direction: column;
    }
    .pgsql-metrics-page .toolbar-meta .meta-item,
    .pgsql-metrics-page .metrics-refresh-btn {
        width: 100%;
    }
    .pgsql-metrics-page .toolbar-actions {
        justify-content: stretch;
    }
    .pgsql-metrics-page .metric-value,
    .pgsql-metrics-page .metric-description,
    .pgsql-metrics-page .metric-error {
        max-width: 220px;
    }
}
</style>

<div class="pgsql-metrics-page">
    <div class="page-head">
        <div>
            <h3>PostgreSQL状态</h3>
            <small>实时指标面板</small>
        </div>
        <div>
            <span id="pgsql-refresh-state-chip" class="runtime-chip">
                <i class="fa fa-circle"></i>
                <span id="pgsql-refresh-state">等待加载</span>
            </span>
        </div>
    </div>

    <div class="metrics-toolbar">
        <div class="toolbar-grid">
            <div>
                <label class="field-label" for="pgsql-instance-select">PostgreSQL实例</label>
                <select id="pgsql-instance-select" class="form-control">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div class="toolbar-meta">
                <span class="meta-item">
                    <i class="fa fa-server fa-fw"></i>
                    <span id="pgsql-selected-endpoint" class="meta-value">未选择实例</span>
                </span>
                <span class="meta-item">
                    <i class="fa fa-clock-o fa-fw"></i>
                    <span id="pgsql-last-updated" class="meta-value">尚未刷新</span>
                </span>
            </div>
            <div class="toolbar-actions">
                <button type="button" id="pgsql-metric-refresh" class="btn btn-primary metrics-refresh-btn" disabled>
                    <i id="pgsql-refresh-icon" class="fa fa-refresh fa-fw"></i> 刷新
                </button>
            </div>
        </div>
    </div>

    <div class="metric-summary-grid" id="pgsql-summary-grid">
        <div class="summary-card summary-card-instance">
            <div class="summary-icon"><i class="fa fa-database"></i></div>
            <div class="summary-content">
                <div class="summary-label">当前实例</div>
                <div id="pgsql-summary-instance" class="summary-value">-</div>
                <div id="pgsql-summary-db" class="summary-subtitle">-</div>
            </div>
        </div>
        <div class="summary-card summary-card-success">
            <div class="summary-icon"><i class="fa fa-check"></i></div>
            <div class="summary-content">
                <div class="summary-label">成功指标</div>
                <div id="pgsql-summary-success" class="summary-value">-</div>
                <div id="pgsql-summary-total" class="summary-subtitle">共 - 项</div>
            </div>
        </div>
        <div class="summary-card summary-card-failed">
            <div class="summary-icon"><i class="fa fa-exclamation-triangle"></i></div>
            <div class="summary-content">
                <div class="summary-label">失败指标</div>
                <div id="pgsql-summary-failed" class="summary-value">-</div>
                <div id="pgsql-summary-health" class="summary-subtitle">-</div>
            </div>
        </div>
        <div class="summary-card summary-card-latency">
            <div class="summary-icon"><i class="fa fa-tachometer"></i></div>
            <div class="summary-content">
                <div class="summary-label">总耗时</div>
                <div id="pgsql-summary-elapsed" class="summary-value">-</div>
                <div class="summary-subtitle">ms</div>
            </div>
        </div>
    </div>

    <div class="state-area">
        <div id="pgsql-metric-loading" class="metric-state" style="display: none;">
            <i class="fa fa-spinner fa-spin"></i> 正在查询
        </div>
        <div id="pgsql-metric-empty" class="metric-state" style="display: none;">
            <i class="fa fa-info-circle"></i> 暂无可用PostgreSQL指标
        </div>
        <div id="pgsql-instance-empty" class="metric-state" style="display: none;">
            <i class="fa fa-database"></i> 暂无可访问的PostgreSQL实例
        </div>
        <div id="pgsql-metric-error" class="alert alert-danger" style="display: none;"></div>
    </div>

    <div class="metrics-table-surface" id="pgsql-metric-table-wrapper" style="display: none;">
        <div class="table-heading">
            <h4>指标明细</h4>
            <span id="pgsql-metric-summary" class="table-summary"></span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover metrics-table">
                <thead>
                <tr>
                    <th style="min-width: 220px;">指标</th>
                    <th>状态</th>
                    <th style="min-width: 140px;">值</th>
                    <th>行数</th>
                    <th>耗时</th>
                    <th style="min-width: 260px;">说明 / 错误</th>
                </tr>
                </thead>
                <tbody id="pgsql-metric-table-body"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
(function () {
    var instanceSelect = document.getElementById('pgsql-instance-select');
    var refreshButton = document.getElementById('pgsql-metric-refresh');
    var refreshIcon = document.getElementById('pgsql-refresh-icon');
    var stateChip = document.getElementById('pgsql-refresh-state-chip');
    var stateText = document.getElementById('pgsql-refresh-state');
    var selectedEndpointNode = document.getElementById('pgsql-selected-endpoint');
    var lastUpdatedNode = document.getElementById('pgsql-last-updated');
    var loadingNode = document.getElementById('pgsql-metric-loading');
    var emptyNode = document.getElementById('pgsql-metric-empty');
    var instanceEmptyNode = document.getElementById('pgsql-instance-empty');
    var errorNode = document.getElementById('pgsql-metric-error');
    var tableWrapper = document.getElementById('pgsql-metric-table-wrapper');
    var tableBody = document.getElementById('pgsql-metric-table-body');
    var summaryNode = document.getElementById('pgsql-metric-summary');
    var summaryInstanceNode = document.getElementById('pgsql-summary-instance');
    var summaryDbNode = document.getElementById('pgsql-summary-db');
    var summarySuccessNode = document.getElementById('pgsql-summary-success');
    var summaryFailedNode = document.getElementById('pgsql-summary-failed');
    var summaryTotalNode = document.getElementById('pgsql-summary-total');
    var summaryHealthNode = document.getElementById('pgsql-summary-health');
    var summaryElapsedNode = document.getElementById('pgsql-summary-elapsed');

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return '';
        }
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function pad(value) {
        value = String(value);
        return value.length < 2 ? '0' + value : value;
    }

    function formatNow() {
        var now = new Date();
        return now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) + ' ' +
            pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    }

    function setRuntimeState(text, stateClass) {
        stateChip.className = 'runtime-chip' + (stateClass ? ' ' + stateClass : '');
        stateText.innerText = text;
    }

    function setLoading(isLoading) {
        refreshButton.disabled = isLoading || !instanceSelect.value;
        refreshIcon.className = isLoading ? 'fa fa-spinner fa-spin fa-fw' : 'fa fa-refresh fa-fw';
        if (isLoading) {
            setRuntimeState('查询中', 'is-loading');
        }
    }

    function resetFeedback() {
        loadingNode.style.display = 'none';
        emptyNode.style.display = 'none';
        instanceEmptyNode.style.display = 'none';
        errorNode.style.display = 'none';
        errorNode.innerText = '';
        tableWrapper.style.display = 'none';
        tableBody.innerHTML = '';
        summaryNode.innerText = '';
    }

    function resetSummary() {
        summaryInstanceNode.innerText = '-';
        summaryDbNode.innerText = '-';
        summarySuccessNode.innerText = '-';
        summaryFailedNode.innerText = '-';
        summaryTotalNode.innerText = '共 - 项';
        summaryHealthNode.innerText = '-';
        summaryElapsedNode.innerText = '-';
    }

    function getSelectedOption() {
        return instanceSelect.options[instanceSelect.selectedIndex];
    }

    function updateSelectedInstancePreview() {
        var option = getSelectedOption();
        if (!option || !option.value) {
            selectedEndpointNode.innerText = '未选择实例';
            summaryInstanceNode.innerText = '-';
            summaryDbNode.innerText = '-';
            return;
        }
        var endpoint = option.getAttribute('data-host') + ':' + option.getAttribute('data-port');
        var dbName = option.getAttribute('data-db') || '默认库';
        selectedEndpointNode.innerText = endpoint + ' / ' + dbName;
        summaryInstanceNode.innerText = option.getAttribute('data-name') || option.text;
        summaryDbNode.innerText = dbName;
    }

    function statusLabel(status) {
        if (status === 'success') {
            return '<span class="status-pill status-pill-success"><i class="fa fa-check"></i>成功</span>';
        }
        if (status === 'failed') {
            return '<span class="status-pill status-pill-failed"><i class="fa fa-times"></i>失败</span>';
        }
        return '<span class="status-pill status-pill-default">' + escapeHtml(status || '未知') + '</span>';
    }

    function renderValue(value) {
        if (value === null || value === undefined || String(value) === '') {
            return '<span class="text-muted">空</span>';
        }
        return '<span class="metric-value">' + escapeHtml(value) + '</span>';
    }

    function metricDetail(metric) {
        if (metric.error) {
            return '<div class="metric-error">' + escapeHtml(metric.error) + '</div>';
        }
        if (metric.description) {
            return '<div class="metric-description">' + escapeHtml(metric.description) + '</div>';
        }
        return '<span class="text-muted">-</span>';
    }

    function sumElapsed(metrics) {
        return metrics.reduce(function (total, metric) {
            var value = Number(metric.elapsed_ms || 0);
            return total + (isNaN(value) ? 0 : value);
        }, 0);
    }

    function renderSummary(data, metrics) {
        var totalElapsed = sumElapsed(metrics);
        var failed = Number(data.failed || 0);
        summaryInstanceNode.innerText = data.instance_name || '-';
        summaryDbNode.innerText = data.db_name || '默认库';
        summarySuccessNode.innerText = data.success || 0;
        summaryFailedNode.innerText = failed;
        summaryTotalNode.innerText = '共 ' + metrics.length + ' 项';
        summaryHealthNode.innerText = failed > 0 ? '存在失败项' : '全部成功';
        summaryElapsedNode.innerText = totalElapsed;
        summaryNode.innerText = (data.instance_name || '-') + '，成功 ' + (data.success || 0) + '，失败 ' + failed;
    }

    function renderRows(metrics) {
        return metrics.map(function (metric) {
            var rowClass = '';
            if (metric.status === 'success') {
                rowClass = 'metric-row-success';
            } else if (metric.status === 'failed') {
                rowClass = 'metric-row-failed';
            }
            return '<tr' + (rowClass ? ' class="' + rowClass + '"' : '') + '>' +
                '<td><div class="metric-name">' + escapeHtml(metric.metric_name) + '</div>' +
                '<span class="metric-key">' + escapeHtml(metric.metric_key) + '</span></td>' +
                '<td>' + statusLabel(metric.status) + '</td>' +
                '<td>' + renderValue(metric.value) + '</td>' +
                '<td class="number-cell">' + escapeHtml(metric.row_count) + '</td>' +
                '<td class="number-cell">' + escapeHtml(metric.elapsed_ms) + ' ms</td>' +
                '<td>' + metricDetail(metric) + '</td>' +
                '</tr>';
        }).join('');
    }

    function showError(message) {
        errorNode.innerText = message;
        errorNode.style.display = 'block';
        setRuntimeState('加载失败', 'is-error');
    }

    function loadMetrics() {
        var instanceId = instanceSelect.value;
        resetFeedback();
        updateSelectedInstancePreview();
        if (!instanceId) {
            setRuntimeState('等待选择', '');
            return;
        }
        loadingNode.style.display = 'block';
        setLoading(true);
        fetch('/dashboard/pgsql_metrics/api/?instance_id=' + encodeURIComponent(instanceId))
            .then(function (response) {
                return response.json().then(function (payload) {
                    if (!response.ok || payload.status !== 0) {
                        throw new Error(payload.msg || ('加载失败: ' + response.status));
                    }
                    return payload;
                });
            })
            .then(function (payload) {
                var data = payload.data || {};
                var metrics = data.metrics || [];
                loadingNode.style.display = 'none';
                renderSummary(data, metrics);
                lastUpdatedNode.innerText = formatNow();
                setRuntimeState(metrics.length ? '已刷新' : '无指标', metrics.length ? 'is-ready' : '');
                if (!metrics.length) {
                    emptyNode.style.display = 'block';
                    return;
                }
                tableBody.innerHTML = renderRows(metrics);
                tableWrapper.style.display = 'block';
            })
            .catch(function (error) {
                loadingNode.style.display = 'none';
                showError(error.message);
            })
            .then(function () {
                setLoading(false);
            });
    }

    function loadInstances() {
        resetFeedback();
        resetSummary();
        setRuntimeState('加载实例', 'is-loading');
        fetch('/dashboard/pgsql_metrics/instances/')
            .then(function (response) {
                return response.json().then(function (payload) {
                    if (!response.ok || payload.status !== 0) {
                        throw new Error(payload.msg || ('加载失败: ' + response.status));
                    }
                    return payload;
                });
            })
            .then(function (payload) {
                var instances = payload.data || [];
                instanceSelect.innerHTML = '';
                if (!instances.length) {
                    instanceSelect.innerHTML = '<option value="">暂无实例</option>';
                    instanceEmptyNode.style.display = 'block';
                    refreshButton.disabled = true;
                    selectedEndpointNode.innerText = '未选择实例';
                    setRuntimeState('无实例', '');
                    return;
                }
                instances.forEach(function (instance, index) {
                    var option = document.createElement('option');
                    option.value = instance.id;
                    option.text = instance.instance_name + ' (' + instance.host + ':' + instance.port + ')';
                    option.setAttribute('data-name', instance.instance_name || '');
                    option.setAttribute('data-host', instance.host || '');
                    option.setAttribute('data-port', instance.port || '');
                    option.setAttribute('data-db', instance.db_name || '');
                    instanceSelect.appendChild(option);
                    if (index === 0) {
                        option.selected = true;
                    }
                });
                refreshButton.disabled = false;
                updateSelectedInstancePreview();
                loadMetrics();
            })
            .catch(function (error) {
                instanceSelect.innerHTML = '<option value="">加载失败</option>';
                refreshButton.disabled = true;
                showError(error.message);
            });
    }

    instanceSelect.addEventListener('change', loadMetrics);
    refreshButton.addEventListener('click', loadMetrics);
    loadInstances();
})();
</script>
{% endblock %}

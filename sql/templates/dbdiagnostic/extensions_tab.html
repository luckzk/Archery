<!-- PgSQL插件展示的表格-->
<div id="extensions" role="tabpanel" class="tab-pane fade table-responsive">
    <div id="pgsql-extensions-toolbar" class="form-inline" style="display:none; margin: 8px 0;">
        <div class="form-group">
            <label for="pgsql_extensions_db">数据库</label>
            <select id="pgsql_extensions_db" class="form-control selectpicker" data-live-search="true" title="默认"></select>
        </div>
        <button id="pgsql_extensions_search" class="btn btn-default" type="button" style="margin-left: 8px;">查询</button>
        <button id="pgsql_extensions_reset" class="btn btn-default" type="button">重置</button>
    </div>
    <table id="extensions-list" data-toggle="table" class="table table-hover"
           style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
    </table>
</div>

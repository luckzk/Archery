<!-- PgSQL Vacuum风险的表格-->
<div id="vacuum" role="tabpanel" class="tab-pane fade table-responsive">
    <div id="pgsql-vacuum-toolbar" class="form-inline" style="display:none; margin: 8px 0;">
        <div class="form-group">
            <label for="pgsql_vacuum_db">数据库</label>
            <select id="pgsql_vacuum_db" class="form-control selectpicker" data-live-search="true" title="全部"></select>
        </div>
        <div class="form-group" style="margin-left: 8px;">
            <label for="pgsql_vacuum_schema">Schema</label>
            <select id="pgsql_vacuum_schema" class="form-control selectpicker" data-live-search="true" title="全部"></select>
        </div>
        <button id="pgsql_vacuum_search" class="btn btn-default" type="button" style="margin-left: 8px;">查询</button>
        <button id="pgsql_vacuum_reset" class="btn btn-default" type="button">重置</button>
    </div>
    <table id="vacuum-list" data-toggle="table" class="table table-hover"
           style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
    </table>
</div>

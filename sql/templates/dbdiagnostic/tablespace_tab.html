<!-- Top表空间的表格-->
<div id="space" role="tabpanel" class="tab-pane fade table-responsive">
    <div id="pgsql-tablespace-toolbar" class="form-inline dbdiagnostic-filter-toolbar" style="display:none;">
        <div class="form-group">
            <label for="pgsql_tablespace_db">数据库</label>
            <select id="pgsql_tablespace_db" class="form-control selectpicker" data-live-search="true" title="全部"></select>
        </div>
        <div class="form-group">
            <label for="pgsql_tablespace_schema">Schema</label>
            <select id="pgsql_tablespace_schema" class="form-control selectpicker" data-live-search="true" title="全部"></select>
        </div>
        <button id="pgsql_tablespace_search" class="btn btn-default" type="button">查询</button>
        <button id="pgsql_tablespace_reset" class="btn btn-default" type="button">重置</button>
    </div>
    <table id="tablespace-list" data-toggle="table" class="table table-hover"
           style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
    </table>
</div>
